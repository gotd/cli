name: goreleaser

on:
  push:
    tags:
      - '*'

# Least privilege: goreleaser only needs to create the release / upload assets.
permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v7.0.0
        with:
          go-version: "1.25"
          # setup-go caches the module and build caches by default (keyed on
          # go.sum), so the manual cache + set-output steps are no longer needed.

      - name: Verify release secrets
        env:
          APP_ID: ${{ secrets.APP_ID }}
          APP_HASH: ${{ secrets.APP_HASH }}
        run: |
          missing=
          [ -n "$APP_ID" ] || missing="$missing APP_ID"
          [ -n "$APP_HASH" ] || missing="$missing APP_HASH"
          if [ -n "$missing" ]; then
            echo "::error::Missing required release secret(s):$missing. Set them with: gh secret set <NAME>"
            exit 1
          fi
          echo "Release credentials present (APP_ID=${#APP_ID} chars, APP_HASH=${#APP_HASH} chars)."

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Built-in app credentials injected into the binaries via -ldflags.
          # Required: the "Verify release secrets" step above fails the build if
          # these are not set, so releases never silently ship the public
          # tdesktop fallback.
          APP_ID: ${{ secrets.APP_ID }}
          APP_HASH: ${{ secrets.APP_HASH }}

      - name: Upload assets
        uses: actions/upload-artifact@v7.0.1
        with:
          name: cli
          path: dist/*
