name: Lint
on:
  push:
    tags:
      - v*
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  golangci-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.0

      - name: Install Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version: "1.25"

      - name: Lint
        uses: golangci/golangci-lint-action@v9.2.1
        with:
          version: v2.12.1
          args: --timeout 5m

  # Check if there are any dirty changes after go mod tidy
  check-mod:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.0

      - name: Install Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version: "1.25"
          # setup-go provides module/build caching out of the box.

      - name: Download dependencies
        run: go mod download && go mod tidy

      - name: Check git diff
        run: git diff --exit-code

