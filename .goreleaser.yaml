# This is an example .goreleaser.yml file with some sensible defaults.
# Make sure to check the documentation at https://goreleaser.com
version: 2
project_name: tg
before:
  hooks:
    # You may remove this if you don't use go modules.
    - go mod tidy
    # you may remove this if you don't need go generate
    - go generate ./...
builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    main: ./cmd/tg
    # Inject built-in app credentials from the APP_ID/APP_HASH secrets at
    # release time. No default: a release build without them fails the CI
    # secrets gate, and a snapshot build leaves them empty (credentials must
    # then be configured per account).
    ldflags:
      - -s -w
      - -X main.builtinAppID={{ envOrDefault "APP_ID" "" }}
      - -X main.builtinAppHash={{ envOrDefault "APP_HASH" "" }}
checksum:
  name_template: 'checksums.txt'
snapshot:
  version_template: "{{ incpatch .Version }}-next"
changelog:
  sort: asc
  filters:
    exclude:
      - '^chore(dep):'
      - '^test:'
nfpms:
  - package_name: tg
    homepage: https://github.com/gotd/cli
    maintainer: Aleksandr Razumov <ernado@ya.ru>
    description: Command line interface for Telegram using gotd
    license: MIT
    formats:
      - apk
      - deb
      - rpm